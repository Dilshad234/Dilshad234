<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060B1A"/>
      <stop offset="0.5" stop-color="#0A1633"/>
      <stop offset="1" stop-color="#001F54"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7E08A"/>
      <stop offset="0.5" stop-color="#E8C35A"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#D4AF37" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="20" fill="url(#dots)"/>
  <rect width="1200" height="320" rx="20" fill="url(#glow)"/>
  <!-- thin gold frame -->
  <rect x="3" y="3" width="1194" height="314" rx="18" fill="none" stroke="#D4AF37" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- name in gold -->
  <text x="70" y="150" fill="url(#gold)" font-size="76" font-weight="800" letter-spacing="-1">Dilshad Ali</text>

  <!-- gold accent underline -->
  <rect x="73" y="170" width="190" height="5" rx="2.5" fill="url(#gold)"/>

  <!-- role -->
  <text x="73" y="214" fill="#E6ECF5" font-size="27" font-weight="600" letter-spacing="0.5">Full Stack Developer &#160;&#183;&#160; AI &amp; Machine Learning</text>

  <!-- subline -->
  <text x="73" y="246" fill="#9DB0CC" font-size="17">Designing and shipping complete, production-ready web applications.</text>

  <!-- tech pills with gold borders -->
  <g font-size="15" font-weight="600" font-family="'Fira Code', Consolas, monospace">
    <g>
      <rect x="73" y="268" width="94" height="27" rx="13.5" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.4"/>
      <text x="120" y="286" fill="#F2D98A" text-anchor="middle">Next.js</text>
    </g>
    <g>
      <rect x="175" y="268" width="86" height="27" rx="13.5" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.4"/>
      <text x="218" y="286" fill="#F2D98A" text-anchor="middle">Python</text>
    </g>
    <g>
      <rect x="269" y="268" width="74" height="27" rx="13.5" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.4"/>
      <text x="306" y="286" fill="#F2D98A" text-anchor="middle">Flask</text>
    </g>
    <g>
      <rect x="351" y="268" width="96" height="27" rx="13.5" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.4"/>
      <text x="399" y="286" fill="#F2D98A" text-anchor="middle">Firebase</text>
    </g>
    <g>
      <rect x="455" y="268" width="118" height="27" rx="13.5" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.4"/>
      <text x="514" y="286" fill="#F2D98A" text-anchor="middle">Scikit-Learn</text>
    </g>
  </g>

  <!-- decorative bracket -->
  <text x="1085" y="205" fill="#D4AF37" fill-opacity="0.10" font-size="250" font-weight="800" font-family="'Fira Code', monospace" text-anchor="middle">&lt;/&gt;</text>
</svg>
