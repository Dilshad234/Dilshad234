<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050912"/>
      <stop offset="0.55" stop-color="#0A1633"/>
      <stop offset="1" stop-color="#001F54"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7E08A"/>
      <stop offset="0.5" stop-color="#E8C35A"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.4" r="0.55">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#D4AF37" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="340" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="20" fill="url(#dots)"/>
  <rect width="1200" height="340" rx="20" fill="url(#glow)"/>
  <rect x="3" y="3" width="1194" height="334" rx="18" fill="none" stroke="#D4AF37" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- ===== LEFT: text ===== -->
  <text x="70" y="150" fill="url(#gold)" font-size="72" font-weight="800" letter-spacing="-1">Dilshad Ali</text>
  <rect x="73" y="170" width="180" height="5" rx="2.5" fill="url(#gold)"/>
  <text x="73" y="212" fill="#E6ECF5" font-size="25" font-weight="700" letter-spacing="1.5">FULL STACK DEVELOPER</text>
  <text x="73" y="244" fill="#9DB0CC" font-size="17" font-weight="500" letter-spacing="2">AI &#160;|&#160; WEB DEVELOPMENT &#160;|&#160; NEXT.JS &#160;|&#160; PYTHON</text>

  <!-- tech pills -->
  <g font-size="14" font-weight="600" font-family="'Fira Code', Consolas, monospace">
    <g><rect x="73" y="266" width="90" height="26" rx="13" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.4"/><text x="118" y="283" fill="#F2D98A" text-anchor="middle">Next.js</text></g>
    <g><rect x="171" y="266" width="84" height="26" rx="13" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.4"/><text x="213" y="283" fill="#F2D98A" text-anchor="middle">Python</text></g>
    <g><rect x="263" y="266" width="92" height="26" rx="13" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.4"/><text x="309" y="283" fill="#F2D98A" text-anchor="middle">Firebase</text></g>
    <g><rect x="363" y="266" width="112" height="26" rx="13" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.4"/><text x="419" y="283" fill="#F2D98A" text-anchor="middle">Scikit-Learn</text></g>
  </g>

  <g transform="translate(-70,5)">
  <!-- ===== RIGHT: laptop + AI brain illustration (gold line art) ===== -->
  <g stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- laptop base -->
    <path d="M 900 210 L 1080 210 L 1095 235 L 885 235 Z"/>
    <!-- laptop screen -->
    <rect x="915" y="95" width="150" height="115" rx="8"/>
    <!-- code on screen -->
    <text x="990" y="165" fill="url(#gold)" stroke="none" font-size="42" font-weight="800" font-family="'Fira Code', monospace" text-anchor="middle">&lt;/&gt;</text>
  </g>
  <!-- AI brain / neural nodes -->
  <g stroke="#D4AF37" stroke-opacity="0.85" stroke-width="2" fill="none">
    <path d="M 1110 110 q 35 -10 38 25 q 18 5 12 30 q 8 22 -18 28 q -10 20 -34 10 q -22 8 -30 -14 q -22 -6 -14 -30 q -10 -24 16 -32 q 8 -22 34 -17 Z" stroke-opacity="0.55"/>
  </g>
  <g fill="url(#gold)">
    <circle cx="1118" cy="120" r="3.5"/>
    <circle cx="1150" cy="138" r="3.5"/>
    <circle cx="1132" cy="160" r="3.5"/>
    <circle cx="1158" cy="172" r="3.5"/>
    <circle cx="1122" cy="185" r="3.5"/>
  </g>
  <g stroke="#D4AF37" stroke-opacity="0.5" stroke-width="1.4">
    <line x1="1118" y1="120" x2="1150" y2="138"/>
    <line x1="1150" y1="138" x2="1132" y2="160"/>
    <line x1="1132" y1="160" x2="1158" y2="172"/>
    <line x1="1132" y1="160" x2="1122" y2="185"/>
    <line x1="1118" y1="120" x2="1132" y2="160"/>
  </g>
  </g>
</svg>
